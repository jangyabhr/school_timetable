group_defaults:
  # Fallback load used when a section has no override entry.
  # All active sections have explicit overrides below, so these serve as
  # documentation of the curriculum baseline and onboarding reference.
  #
  # Solver constraints (why not every group reaches 36/36):
  #   • class_6_8  (4 sections: 7A,7B,8A,8B): Snigdha (Hindi×4 + Odia×0 = 12/wk),
  #     Ganesh (Sanskrit×4 + Odia×2 = 18/wk) teach across the full group → capped at 32/36.
  #   • class_9_10 (4 sections): cross-group teachers like Pratikshya (English 8A/8B+9A/9B)
  #     and Sunil/JB → capped at 31/36.
  #   • class_11_12 (1 section: 12 only): lab subjects each at 6 → 34/36.

  class_6_8:
    Math: 5
    Science: 5
    English: 5
    SST: 4
    Hindi: 3
    Odia: 3
    Sanskrit: 3
    ComputerScience: 3
    Library: 1
    # Total: 32  (4 free periods/week in a 6×6=36 slot week)

  class_9_10:
    Math: 6
    Science: 6
    English: 5
    SST: 6
    Odia: 3
    IT: 4
    Library: 1
    # Total: 31  (5 free periods/week)

  class_11_12:
    # Common senior subjects only — stream subjects defined per section below
    Math: 6
    English: 5
    IT: 4
    Library: 1
    # Total base: 16 — stream subjects added via section_overrides


