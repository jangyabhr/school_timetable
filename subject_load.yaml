class_groups:

  # April schedule: 6 teaching periods/day × 6 days = 36 slots/week per class.
  # Teacher loads manually calculated so no teacher exceeds 30 periods/week.
  #
  # Solver constraints (why not every group reaches 36/36):
  #   • class_6_8  (6 sections): Snigdha (Hindi×6 + Odia×2 = 24/wk), Ganesh
  #     (Sanskrit×6 + Odia×2 = 24/wk) and Subhasmita (Odia×6 sections = 18/wk)
  #     all teach across the full group; raising any subject above the baseline
  #     packs 8A/8B too tightly for the greedy solver → capped at 32/36.
  #   • class_9_10 (4 sections): cross-group teachers like Pratikshya (English
  #     8A/8B + 9A/9B) and Sunil/JB exhaust teacher-combo options in 8A when
  #     9A/9B fill rises; SST can safely go to 6 (ANIL & Srikant teach separate
  #     sections here) → capped at 31/36.
  #   • class_11_12 (2 sections): no cross-group Subhasmita bottleneck; lab
  #     subjects (Physics, Chemistry, Biology) each safely raised +1 → 34/36.

  class_6_8:
    Math: 5
    Science: 5
    English: 5
    SST: 4          # ANIL: 4×4+6=22/wk  |  Srikant: 2×4+2×6+6=26/wk
    Hindi: 3        # Snigdha: 6×3+2×3=24/wk
    Odia: 3         # Snigdha: 24/wk (6A,6B)  |  Ganesh: 24/wk (7A,7B)  |  Subhasmita: 18/wk (8A,8B)
    Sanskrit: 3     # Ganesh: 6×3+2×3=24/wk
    ComputerScience: 3  # Usha: 2×3+2×4+2×4=22/wk  |  Sanjukta: 4×3+2×5=22/wk
    # Total: 31 (5 free periods/week)

  class_9_10:
    Math: 6
    Science: 6
    English: 5      # Pratikshya: 2×5+2×5=20/wk  |  Laxmipriya: 2×5+2×5=20/wk
    SST: 6          # +1 from 5  |  ANIL: 4×4+1×6=22/wk  |  Srikant: 2×4+2×6+1×6=26/wk
    Odia: 3         # Subhasmita: 6×3=18/wk across all 6 sections
    IT: 4           # Usha: 2×3+2×4+2×4=22/wk  |  Sanjukta: 4×3+2×5=22/wk
    # Total: 30 (6 free periods/week)

  class_11_12:
    Physics: 6      # +1 from 5  |  Pratibha: 2×5+2×6=22/wk
    Chemistry: 6    # +1 from 5  |  Priyanka: 2×5+2×6=22/wk
    Biology: 6      # +1 from 5  |  Sidharth: 2×6+2×6=24/wk
    Math: 6         # Mira: 2×6+2×6=24/wk
    English: 5      # Radheshyam spans 6_8+11_12: 2×5+2×5=20/wk
    IT: 4           # Usha: 2×3+2×4+2×4=22/wk
    # Total: 33 (3 free periods/week)
