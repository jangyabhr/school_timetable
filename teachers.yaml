# teachers.yaml
# Declares each teacher's weekly capacity and qualified subjects.
# Used by assignment_validator.py to catch over-assignment before the solver runs.
#
# capacity = maximum teaching periods per week this teacher may be assigned.
# subjects = list of subjects this teacher is qualified to teach.
#
# Schedule: 4 periods/day × 6 days = 24 slots/week per class

teachers:
  Nandini:
    capacity: 22       # load:  8  (Math: 7A,7B ×4)
    subjects: [Math]
  JB:
    capacity: 26       # load: 16  (Math: 8A,8B,9A,9B ×4)
    subjects: [Math]
  Mira:
    capacity: 26       # load: 12  (Math: 10A,10B,12 ×4)
    subjects: [Math]
  Pratibha:
    capacity: 20       # load:  4  (Physics: 12 only)
    subjects: [Science, Physics]
  Priyanka:
    capacity: 24       # load: 12  (Science: 7A,7B ×4 + Chemistry: 12 ×4)
    subjects: [Science, Chemistry]
  Sunil:
    capacity: 26       # load: 16  (Science: 8A,8B,9A,9B ×4)
    subjects: [Science]
  Sidharth:
    capacity: 26       # load: 12  (Science: 10A,10B ×4 + Biology: 12 ×4)
